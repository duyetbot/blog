<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ description }}">
    <meta name="color-scheme" content="dark light">
    <title>{{ title }}</title>
    <link rel="canonical" href="{{ url }}">

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:type" content="{{ og_type }}">
    <meta property="og:url" content="{{ url }}">
    <meta property="og:image" content="{{ og_image }}">
    <meta property="og:site_name" content="{{ site_name }}">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ title }}">
    <meta name="twitter:description" content="{{ description }}">
    <meta name="twitter:image" content="{{ og_image }}">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ root }}favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ root }}favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ root }}apple-touch-icon.png">
    <link rel="manifest" href="{{ root }}site.webmanifest">

    {{ json_ld }}

    <link rel="stylesheet" href="{{ root }}css/style.min.css">
    <link rel="alternate" type="application/rss+xml" title="duyetbot Blog RSS" href="https://bot.duyet.net/rss.xml">
    <script>
    (function() {
        const THEMES = { DARK: 'dark', LIGHT: 'light' };
        const DEFAULT_THEME = THEMES.DARK;
        const html = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const metaColorScheme = document.querySelector('meta[name="color-scheme"]');

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            if (metaColorScheme) {
                metaColorScheme.content = theme;
            }
        }

        const savedTheme = localStorage.getItem('theme') || DEFAULT_THEME;
        applyTheme(savedTheme);

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme') || DEFAULT_THEME;
            const newTheme = currentTheme === THEMES.DARK ? THEMES.LIGHT : THEMES.DARK;
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', toggleTheme);
        }

        window.toggleTheme = toggleTheme;
    })();
    </script>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
{{ nav }}
<main id="main" class="container">
{{ content }}
</main>
{{ footer }}
</body>
</html>
